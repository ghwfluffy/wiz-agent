services:
  db:
    image: postgres:18
    restart: unless-stopped
    env_file:
      - path: .env.example
        required: true
      - path: .env
        required: false
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agent_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-agent}
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 2s
      timeout: 3s
      retries: 20
      start_period: 2s

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env.example
        required: true
      - path: .env
        required: false
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    working_dir: /workspace/api
    command: sh -c "npm install && npm run migrate && npm run dev"
    volumes:
      - .:/workspace
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${API_PORT:-18080}:8000"

  worker:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env.example
        required: true
      - path: .env
        required: false
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    working_dir: /workspace/api
    command: sh -c "npm install && npm run migrate && npm run worker"
    volumes:
      - .:/workspace
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    restart: unless-stopped
    environment:
      VITE_APP_BASE_PATH: ${VITE_APP_BASE_PATH:-}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
      VITE_AUTH_MODE: ${VITE_AUTH_MODE:-standalone}
      VITE_API_PROXY_TARGET: ${VITE_API_PROXY_TARGET:-http://api:8000}
    working_dir: /workspace/web
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 8081"
    volumes:
      - .:/workspace
    depends_on:
      - api
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${WEB_PORT:-18081}:8081"

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
      args:
        VITE_APP_BASE_PATH: ${VITE_APP_BASE_PATH:-}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
        VITE_AUTH_MODE: ${VITE_AUTH_MODE:-standalone}
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${NGINX_PORT:-18082}:80"

volumes:
  postgres-data:
